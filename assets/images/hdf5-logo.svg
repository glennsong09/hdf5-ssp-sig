<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" width="200" height="50">
  <defs>
    <linearGradient id="hdfGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#046bd2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- HDF5 Text -->
  <text x="5" y="35" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="bold" fill="url(#hdfGradient)">
    HDF5
  </text>

  <!-- Security badge -->
  <g transform="translate(115, 8)">
    <rect x="0" y="0" width="80" height="32" rx="4" fill="#1e293b"/>
    <text x="40" y="22" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">
      SECURITY
    </text>
  </g>
